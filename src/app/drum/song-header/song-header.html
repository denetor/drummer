<header>
    <h1>{{ song().title }}</h1>
    <p class="meta">
        <span class="artist">{{ song().artist }}</span>
        <span class="bpm">{{ song().properties.bpm }} BPM</span>
        <button mat-icon-button aria-label="Edit song" (click)="editRequested.emit()">
            <mat-icon>edit</mat-icon>
        </button>
    </p>
</header>
